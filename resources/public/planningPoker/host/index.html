<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Poker</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    />
    <script src="https://kit.fontawesome.com/d550ee8263.js" crossorigin></script>
    <script src="https://gizmo-atheneum.github.io/structure/importnamespace/script.js"></script>
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://gizmo-atheneum.github.io/namespaces/ajax.js"></script>

    <script type="text/babel" src="../../common/util.js"></script>

    <script type="text/babel" src="../../facetious-nocturn/callbacks.js"></script>
    <script type="text/babel" src="../../facetious-nocturn/client.js"></script>
    <script type="text/babel" src="../../facetious-nocturn/constants.js"></script>
    <script type="text/babel" src="../../facetious-nocturn/host.js"></script>

    <script type="text/babel" src="../common/icons.js"></script>
    <script type="text/babel" src="../common/planningPoker.js"></script>

    <script type="text/babel" src="./planningPoker.js"></script>

    <!-- bind app root -->
    <script type="text/babel">
      (function () {
        const { PlanningPoker, util } = imports({
          'planning-poker.PlanningPoker': 'PlanningPoker',
          'common.Utilities': 'util',
        });
        const unusedNamespaces = listUnusedNamespaces();
        if (unusedNamespaces.length > 0) {
          console.warn({ unusedNamespaces });
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<PlanningPoker query={util.getUrlQuery()}/>);
      })();
    </script>
</head>
<body class="bg-dark text-light">
  <div id="root"></div>
</body>
</html>
